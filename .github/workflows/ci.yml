# ==============================================================================
# CI Pipeline — Quality, Tests, Build Verification
# ==============================================================================
# Triggers on pushes to main/develop and all pull requests.
# Jobs run in parallel where possible for speed.
# ==============================================================================

name: CI — Quality & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress CI runs for the same branch/PR (saves runner minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Code Quality (TypeScript + ESLint + Prettier)
  # ────────────────────────────────────────────────────────────────────────────
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npx prettier --check .

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Unit & Component Tests (Vitest)
  # ────────────────────────────────────────────────────────────────────────────
  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run Vitest
        run: npx vitest run --reporter=verbose --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Build Verification (Next.js Build + Asset Check)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*', 'public/**/*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Check public asset sizes
        run: |
          echo "📦 Public asset size report:"
          du -sh public/ || echo "No public directory"
          echo ""
          echo "📊 Largest files in public/:"
          find public/ -type f -exec du -h {} + 2>/dev/null | sort -rh | head -20
          echo ""
          # Fail if public/ exceeds 50MB (configurable)
          TOTAL_SIZE=$(du -sb public/ 2>/dev/null | cut -f1 || echo 0)
          MAX_SIZE=$((50 * 1024 * 1024))  # 50MB
          if [ "$TOTAL_SIZE" -gt "$MAX_SIZE" ]; then
            echo "❌ ERROR: public/ directory ($TOTAL_SIZE bytes) exceeds 50MB budget!"
            echo "Consider using Git LFS or optimizing assets. See .github/ASSET_GUIDELINES.md"
            exit 1
          fi
          echo "✅ Asset size within budget ($TOTAL_SIZE bytes / $MAX_SIZE bytes)"

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify standalone output
        run: |
          echo "📁 Standalone output check:"
          if [ -d ".next/standalone" ]; then
            echo "✅ Standalone directory exists"
            du -sh .next/standalone/
          else
            echo "❌ Standalone output not found!"
            exit 1
          fi
          if [ -f ".next/standalone/server.js" ]; then
            echo "✅ server.js exists"
          else
            echo "❌ server.js not found in standalone!"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/standalone/
            .next/static/
            public/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: E2E Tests (Playwright) — runs after build succeeds
  # ────────────────────────────────────────────────────────────────────────────
  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .

      - name: Prepare standalone server
        run: |
          # Copy static assets into standalone
          cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
          cp -r public .next/standalone/public 2>/dev/null || true

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          # Override webServer to use standalone server
          # Playwright config handles this via webServer.command

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
