services:
  # ── Production ──────────────────────────────────────────────────────────────
  portfolio:
    image: ghcr.io/kinzx/kinaraurasae.porto:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-prod
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Development (optional — use `docker compose --profile dev up`) ─────────
  portfolio-dev:
    image: node:20-alpine
    container_name: portfolio-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules  # Anonymous volume to avoid overwriting host node_modules
      - /app/.next          # Anonymous volume for build cache
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true  # Enable polling for file changes in Docker
    command: sh -c "npm install && npm run dev"
    profiles:
      - dev
